<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Кликер</title>
    <style>
        /* CSS: Отвечает за внешний вид */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* Чтобы текст не выделялся при частых кликах */
        }

        h1 { margin-bottom: 10px; }

        #score-container {
            font-size: 2rem;
            margin-bottom: 20px;
            background: #34495e;
            padding: 10px 20px;
            border-radius: 10px;
        }

        #click-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 50%; /* Делает кнопку круглой */
            cursor: pointer;
            box-shadow: 0 5px #c0392b;
            transition: transform 0.1s;
        }

        #click-btn:active {
            transform: scale(0.95); /* Эффект нажатия */
            box-shadow: 0 2px #c0392b;
        }

        .shop {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .upgrade-btn {
            background-color: #f1c40f;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #2c3e50;
        }

        .upgrade-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- HTML: Структура страницы -->
    <h1>Супер Кликер</h1>
    
    <div id="score-container">
        Очки: <span id="score">0</span>
    </div>

    <button id="click-btn" onclick="clickAction()">КЛИК!</button>

    <div class="shop">
        <button class="upgrade-btn" id="buy-click" onclick="buyClickUpgrade()">
            Сила клика (+1)<br>Цена: <span id="click-cost">10</span>
        </button>
        <button class="upgrade-btn" id="buy-auto" onclick="buyAutoClicker()">
            Авто-кликер (+1/сек)<br>Цена: <span id="auto-cost">50</span>
        </button>
    </div>

    <script>
        // JavaScript: Логика игры
        
        // Переменные состояния игры
        let score = 0;
        let clickPower = 1;
        let autoClickPower = 0;
        
        let clickUpgradeCost = 10;
        let autoClickerCost = 50;

        // Ссылки на элементы HTML
        const scoreEl = document.getElementById('score');
        const clickCostEl = document.getElementById('click-cost');
        const autoCostEl = document.getElementById('auto-cost');
        const btnClickUpgrade = document.getElementById('buy-click');
        const btnAutoUpgrade = document.getElementById('buy-auto');

        // Функция основного клика
        function clickAction() {
            score += clickPower;
            updateUI();
        }

        // Покупка улучшения клика
        function buyClickUpgrade() {
            if (score >= clickUpgradeCost) {
                score -= clickUpgradeCost;       // Списываем очки
                clickPower += 1;                 // Увеличиваем силу
                clickUpgradeCost = Math.floor(clickUpgradeCost * 1.5); // Увеличиваем цену
                updateUI();
            }
        }

        // Покупка авто-кликера
        function buyAutoClicker() {
            if (score >= autoClickerCost) {
                score -= autoClickerCost;
                autoClickPower += 1;
                autoClickerCost = Math.floor(autoClickerCost * 1.5);
                updateUI();
            }
        }

        // Автоматическое начисление очков (раз в секунду)
        setInterval(() => {
            if (autoClickPower > 0) {
                score += autoClickPower;
                updateUI();
            }
        }, 1000);

        // Функция обновления интерфейса (проверка доступности кнопок и текста)
        function updateUI() {
            scoreEl.innerText = score;
            clickCostEl.innerText = clickUpgradeCost;
            autoCostEl.innerText = autoClickerCost;

            // Блокируем кнопки, если не хватает денег
            btnClickUpgrade.disabled = score < clickUpgradeCost;
            btnAutoUpgrade.disabled = score < autoClickerCost;
        }

        // Запускаем обновление при старте
        updateUI();

    </script>
</body>
</html>
